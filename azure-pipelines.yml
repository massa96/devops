trigger:
  branches:
    include:
      - main
      - master
      - develop

pr:
  branches:
    include:
      - main
      - master
      - develop

variables:
  vmImageName: 'ubuntu-latest'
  nodeVersion: '22.x'
  workingDirectory: 'devops-blog'
  npmCacheDir: '$(Pipeline.Workspace)/.npm'
  artifactName: 'nextjs-standalone'
  enableDeploy: 'true'
  webAppName: 'devops-blog-sp'
  resourceGroupName: 'ziama'

stages:
- stage: Build
  displayName: 'Build Next.js artifact'
  jobs:
  - job: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      clean: true

    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'

    - task: Cache@2
      inputs:
        key: 'npm | "$(Agent.OS)" | $(workingDirectory)/package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: '$(npmCacheDir)'

    - script: npm ci --cache "$(npmCacheDir)" --prefer-offline
      workingDirectory: '$(workingDirectory)'

    - script: npm run build
      workingDirectory: '$(workingDirectory)'
      env:
        NEXT_TELEMETRY_DISABLED: '1'

    - script: |
        set -eux
        PACKAGE_DIR="$(Build.ArtifactStagingDirectory)/package"
        mkdir -p "$PACKAGE_DIR/.next"

        cp -R .next/standalone "$PACKAGE_DIR/.next/standalone"
        cp -R .next/static "$PACKAGE_DIR/.next/static"

        if [ -d public ]; then
          cp -R public "$PACKAGE_DIR/public"
        fi

        test -f "$PACKAGE_DIR/.next/standalone/server.js"
      workingDirectory: '$(workingDirectory)'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/package'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
      artifact: '$(artifactName)'

- stage: Deploy
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['enableDeploy'], 'true'))
  jobs:
  - job: Deploy
    pool:
      vmImage: $(vmImageName)
    steps:
    - download: current
      artifact: '$(artifactName)'

    - script: |
        set -eux

        az login --service-principal \
          --username "$AZURE_CLIENT_ID" \
          --password "$AZURE_CLIENT_SECRET" \
          --tenant "$AZURE_TENANT_ID"

        az account set --subscription "$AZURE_SUBSCRIPTION_ID"

        az webapp config appsettings set \
          --resource-group "$(resourceGroupName)" \
          --name "$(webAppName)" \
          --settings WEBSITE_RUN_FROM_PACKAGE=1 NODE_ENV=production

        az webapp config set \
          --resource-group "$(resourceGroupName)" \
          --name "$(webAppName)" \
          --linux-fx-version "NODE|22-lts" \
          --startup-file "node .next/standalone/server.js"

        az webapp deploy \
          --resource-group "$(resourceGroupName)" \
          --name "$(webAppName)" \
          --src-path "$(Pipeline.Workspace)/$(artifactName)/$(artifactName).zip" \
          --type zip
      env:
        AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
        AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
        AZURE_TENANT_ID: $(AZURE_TENANT_ID)
        AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
