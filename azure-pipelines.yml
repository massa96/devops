trigger:
  branches:
    include:
    - main
    - master
    - develop

pr:
  branches:
    include:
    - main
    - master
    - develop

variables:
  vmImageName: 'ubuntu-latest'
  nodeVersion: '20.x'
  workingDirectory: 'devops-blog'
  npmCacheDir: '$(Pipeline.Workspace)/.npm'
  artifactName: 'nextjs-standalone'
  enableDeploy: 'true'
  webAppName: 'devops-blog-sp'
  resourceGroupName: 'massakoivogui21'

stages:
- stage: Build
  displayName: 'Build Next.js artifact'
  jobs:
  - job: Build
    displayName: 'Install and package app'
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      clean: 'true'

    - task: NodeTool@0
      displayName: 'Use Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - task: Cache@2
      displayName: 'Restore npm cache'
      inputs:
        key: 'npm | "$(Agent.OS)" | $(workingDirectory)/package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: '$(npmCacheDir)'

    - script: npm ci --cache "$(npmCacheDir)" --prefer-offline
      displayName: 'Install dependencies'
      workingDirectory: '$(workingDirectory)'

    - script: npm run build
      displayName: 'Build Next.js app'
      workingDirectory: '$(workingDirectory)'
      env:
        NEXT_TELEMETRY_DISABLED: '1'

    - script: |
        set -eux
        PACKAGE_DIR="$(Build.ArtifactStagingDirectory)/package"
        mkdir -p "$PACKAGE_DIR/.next"
        cp -R .next/standalone/* "$PACKAGE_DIR/"
        cp -R .next/static "$PACKAGE_DIR/.next/static"
        if [ -d public ]; then
          cp -R public "$PACKAGE_DIR/public"
        fi
        test -f "$PACKAGE_DIR/server.js"
      displayName: 'Assemble standalone deployment package'
      workingDirectory: '$(workingDirectory)'

    - task: ArchiveFiles@2
      displayName: 'Archive deployment package'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/package'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
      displayName: 'Publish deployment artifact'
      artifact: '$(artifactName)'

- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['enableDeploy'], 'true'))
  jobs:
  - job: Deploy
    displayName: 'Deploy web app'
    pool:
      vmImage: $(vmImageName)
    steps:
    - download: current
      artifact: '$(artifactName)'

    - script: |
        set -eux
        test -n "$AZURE_CLIENT_ID"
        test -n "$AZURE_CLIENT_SECRET"
        test -n "$AZURE_TENANT_ID"
        test -n "$AZURE_SUBSCRIPTION_ID"
        test -n "$(resourceGroupName)"
        test -n "$(webAppName)"

        az login --service-principal \
          --username "$AZURE_CLIENT_ID" \
          --password "$AZURE_CLIENT_SECRET" \
          --tenant "$AZURE_TENANT_ID"

        az account set --subscription "$AZURE_SUBSCRIPTION_ID"

        az webapp config appsettings set \
          --resource-group "$(resourceGroupName)" \
          --name "$(webAppName)" \
          --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false NODE_ENV=production

        az webapp config set \
          --resource-group "$(resourceGroupName)" \
          --name "$(webAppName)" \
          --linux-fx-version "NODE|20-lts" \
          --startup-file "node server.js"

        az webapp deploy \
          --resource-group "$(resourceGroupName)" \
          --name "$(webAppName)" \
          --src-path "$(Pipeline.Workspace)/$(artifactName)/$(artifactName).zip" \
          --type zip
      displayName: 'Deploy with Azure CLI'
      env:
        AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
        AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
        AZURE_TENANT_ID: $(AZURE_TENANT_ID)
        AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
